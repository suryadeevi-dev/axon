services:
  # ── FastAPI Backend ────────────────────────────────────────────────────────
  - type: web
    name: axon-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://suryadeevi-dev.github.io
      - key: AGENT_IMAGE
        value: axon-agent-base:latest
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://axon-api-lhjm.onrender.com/api/auth/google/callback
      - key: FRONTEND_URL
        value: https://suryadeevi-dev.github.io/axon
    healthCheckPath: /health
    autoDeploy: true

  # Note: The agent Docker execution layer requires a machine with Docker.
  # On Render free tier, agent compute runs in DEMO mode (subprocess isolation).
  # For full Docker-per-agent isolation, deploy to EC2 via infra/stacks/axon_stack.py
