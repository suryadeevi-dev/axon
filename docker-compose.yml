version: "3.9"

services:
  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: axon-api
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod-32chars}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://localhost:3000}
      AGENT_IMAGE: axon-agent-base:latest
      AGENT_NETWORK: axon-agents
      AGENT_MEM_LIMIT: "256m"
      AGENT_CPU_QUOTA: "50000"
      # Leave AWS_ACCESS_KEY_ID unset → triggers in-memory store
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      retries: 10
      start_period: 15s

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: axon-frontend
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

networks:
  default:
    name: axon-dev
