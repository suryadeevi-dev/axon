version: "3.9"

services:
  # ── DynamoDB Local ────────────────────────────────────────────────────────
  dynamodb-local:
    image: amazon/dynamodb-local:2.4.0
    container_name: axon-dynamo
    ports:
      - "8001:8000"
    command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-inMemory"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000 || exit 1"]
      interval: 10s
      retries: 5

  # ── DynamoDB Table Bootstrap ─────────────────────────────────────────────
  dynamo-init:
    image: amazon/aws-cli:latest
    container_name: axon-dynamo-init
    depends_on:
      dynamodb-local:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        aws dynamodb create-table --table-name axon-users \
          --attribute-definitions AttributeName=id,AttributeType=S AttributeName=email,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[{"IndexName":"email-index","KeySchema":[{"AttributeName":"email","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --endpoint-url http://dynamodb-local:8000 2>/dev/null || true

        aws dynamodb create-table --table-name axon-agents \
          --attribute-definitions AttributeName=id,AttributeType=S AttributeName=user_id,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[{"IndexName":"user_id-index","KeySchema":[{"AttributeName":"user_id","KeyType":"HASH"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --endpoint-url http://dynamodb-local:8000 2>/dev/null || true

        aws dynamodb create-table --table-name axon-messages \
          --attribute-definitions AttributeName=id,AttributeType=S AttributeName=agent_id,AttributeType=S AttributeName=timestamp,AttributeType=S \
          --key-schema AttributeName=id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --global-secondary-indexes '[{"IndexName":"agent_id-timestamp-index","KeySchema":[{"AttributeName":"agent_id","KeyType":"HASH"},{"AttributeName":"timestamp","KeyType":"RANGE"}],"Projection":{"ProjectionType":"ALL"}}]' \
          --endpoint-url http://dynamodb-local:8000 2>/dev/null || true

        echo "Tables ready."

  # ── Backend API ───────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: axon-api
    depends_on:
      dynamodb-local:
        condition: service_healthy
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DYNAMO_ENDPOINT_URL: http://dynamodb-local:8000
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    volumes:
      # Mount Docker socket so the API can manage agent containers
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
    restart: unless-stopped
    user: root   # needed to access docker socket; harden in prod with docker group
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 15s
      retries: 5

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: axon-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    restart: unless-stopped

networks:
  default:
    name: axon-dev
